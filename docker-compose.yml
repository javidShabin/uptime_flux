version: "3.9"

services:
  api:
    build: ./apps/api
    command: npm run dev
    volumes:
      - ./apps/api:/app
    ports:
      - "3000:3000"
    env_file:
      - ./apps/api/.env
  worker:
    build: ./apps/worker
    command: npm run dev
    volumes:
      - ./apps/worker:/app
    depends_on:
      - redis
  web:
    build: ./apps/web
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./apps/web:/app
    ports:
      - "5173:5173"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

